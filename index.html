<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人化股票追蹤與買賣決策儀表板</title>
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-color: #121826;
            --card-bg: #1b2234;
            --text-main: #f3f4f6;
            --text-sub: #9ca3af;
            --accent-green: #00c076;
            --accent-red: #ff3b30;
            --accent-yellow: #f59e0b;
            --border-color: #2e374a;
        }

        body {
            margin: 0;
            padding: 24px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn:hover { background: #2563eb; }
        .btn-danger { background: var(--accent-red); }

        /* 輸入控制區塊 */
        .control-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        input, select {
            background: #121826;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        .stock-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 20px;
            position: relative;
        }

        .signal-box {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 0.875rem;
            line-height: 1.4;
        }
        .signal-buy { background: rgba(0, 192, 118, 0.15); border-left: 4px solid var(--accent-green); }
        .signal-sell { background: rgba(255, 59, 48, 0.15); border-left: 4px solid var(--accent-red); }
        .signal-hold { background: rgba(156, 163, 175, 0.15); border-left: 4px solid var(--text-sub); }

        .pnl-badge {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .profit { color: var(--accent-red); background: rgba(255, 59, 48, 0.1); } /* 台股習慣：紅漲綠跌 */
        .loss { color: var(--accent-green); background: rgba(0, 192, 118, 0.1); }

        .chart-container { height: 200px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>📈 股票買賣決策管理系統</h1>
        <div id="auth-section">
            <button class="btn" id="login-btn">Google 帳號登入</button>
            <span id="user-info" style="display:none;"></span>
        </div>
    </header>

    <!-- 新增關注股 / 持股選單 -->
    <div class="control-panel" id="add-panel" style="display: none;">
        <h3>➕ 新增股票標的：</h3>
        <input type="text" id="ticker-input" placeholder="股票代碼 (例: 2330.TW 或 NVDA)" />
        <select id="type-select">
            <option value="watchlist">關注股（評估買點）</option>
            <option value="portfolio">已買持股（評估賣點）</option>
        </select>
        <input type="number" id="cost-input" placeholder="買入價格 (已買股必填)" style="display:none;" />
        <button class="btn" id="add-btn">新增至清單</button>
    </div>

    <h2>💼 我的持股診斷（該不該賣）</h2>
    <div class="grid-container" id="portfolio-grid"></div>

    <h2 style="margin-top: 32px;">👀 關注股追蹤（該不該買）</h2>
    <div class="grid-container" id="watchlist-grid"></div>

    <!-- Firebase SDK (v10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // UI 切換邏輯
        document.getElementById('type-select').addEventListener('change', (e) => {
            document.getElementById('cost-input').style.display = e.target.value === 'portfolio' ? 'inline-block' : 'none';
        });

        // 1. Google 登入驗證
        document.getElementById('login-btn').addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider);
        });

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-info').style.display = 'inline';
                document.getElementById('user-info').innerText = `👤 ${user.displayName}`;
                document.getElementById('add-panel').style.display = 'flex';
                listenToUserData(user.uid);
            }
        });

        // 2. 新增股票至 Firestore
        document.getElementById('add-btn').addEventListener('click', async () => {
            if (!currentUser) return alert("請先登入帳號！");
            const ticker = document.getElementById('ticker-input').value.trim().toUpperCase();
            const type = document.getElementById('type-select').value;
            const cost = parseFloat(document.getElementById('cost-input').value);

            if (!ticker) return alert("請輸入股票代碼！");
            if (type === 'portfolio' && (isNaN(cost) || cost <= 0)) return alert("請輸入正確的買入成本價！");

            const docId = `${currentUser.uid}_${ticker}`;
            await setDoc(doc(db, "user_stocks", docId), {
                userId: currentUser.uid,
                ticker: ticker,
                type: type,
                costPrice: type === 'portfolio' ? cost : null,
                createdAt: new Date()
            });

            alert(`成功新增 ${ticker}！Python 腳本更新後即可看到完整技術分析。`);
            document.getElementById('ticker-input').value = '';
        });

        // 3. 監聽並同步使用者的股票資料
        function listenToUserData(userId) {
            onSnapshot(collection(db, "stocks"), (snapshot) => {
                const stockDataMap = {};
                snapshot.forEach(doc => stockDataMap[doc.id] = doc.data());

                onSnapshot(collection(db, "user_stocks"), (userSnapshot) => {
                    const portfolioGrid = document.getElementById('portfolio-grid');
                    const watchlistGrid = document.getElementById('watchlist-grid');
                    portfolioGrid.innerHTML = '';
                    watchlistGrid.innerHTML = '';

                    userSnapshot.forEach((docSnapshot) => {
                        const item = docSnapshot.data();
                        if (item.userId !== userId) return;

                        const info = stockDataMap[item.ticker] || {
                            ticker: item.ticker,
                            latest_price: '計算中...',
                            rsi: '-',
                            reason: '資料準備中，請確保 Python 腳本已執行。'
                        };

                        const card = createStockCard(item, info, docSnapshot.id);
                        if (item.type === 'portfolio') {
                            portfolioGrid.appendChild(card);
                        } else {
                            watchlistGrid.appendChild(card);
                        }

                        if (info.history) {
                            setTimeout(() => renderChart(`chart-${docSnapshot.id}`, info.history), 50);
                        }
                    });
                });
            });
        }

        // 4. 建立卡片 UI 與買賣決策分析邏輯
        function createStockCard(userStock, info, docId) {
            const card = document.createElement('div');
            card.className = 'stock-card';

            let analysisHTML = '';
            
            if (userStock.type === 'portfolio') {
                // --- 【持股賣出邏輯分析】 ---
                const price = info.latest_price;
                const cost = userStock.costPrice;
                const pnlPercent = typeof price === 'number' ? (((price - cost) / cost) * 100).toFixed(2) : 0;
                const pnlClass = pnlPercent >= 0 ? 'profit' : 'loss';

                let sellSignal = '觀望續抱';
                let signalClass = 'signal-hold';
                let sellReasons = [];

                if (typeof price === 'number') {
                    if (pnlPercent >= 15) sellReasons.append("停利點：獲利已達 15% 以上，可考慮分批停利");
                    if (pnlPercent <= -10) sellReasons.append("停損點：虧損已達 -10%，建議嚴格執行停損");
                    if (info.rsi > 70) sellReasons.append(`技術面：RSI (${info.rsi}) 進入高檔超買區，隨時可能拉回`);
                    if (info.bb_upper && price >= info.bb_upper) sellReasons.append("技術面：股價已衝破布林上軌，過熱訊號");

                    if (sellReasons.length > 0) {
                        sellSignal = '建議分批賣出 / 停損停利';
                        signalClass = 'signal-sell';
                    }
                }

                analysisHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span>買入成本: $${cost}</span>
                        <span class="pnl-badge ${pnlClass}">報酬率: ${pnlPercent}%</span>
                    </div>
                    <div class="signal-box ${signalClass}">
                        <strong>🚨 賣出診斷：${sellSignal}</strong><br/>
                        ${sellReasons.length > 0 ? sellReasons.join('<br/>') : '目前未觸發停利/停損或超買訊號，續抱觀望。'}
                    </div>
                `;
            } else {
                // --- 【關注股買入邏輯分析】 ---
                let buySignal = '觀望等待';
                let signalClass = 'signal-hold';
                let buyReasons = [];

                if (info.rsi < 35) buyReasons.append(`RSI (${info.rsi}) 進入超賣區，短線隨時反彈`);
                if (info.bb_lower && info.latest_price <= info.bb_lower) buyReasons.append("股價觸及布林下軌，極端低估");

                if (buyReasons.length > 0) {
                    buySignal = '出現買進訊號！';
                    signalClass = 'signal-buy';
                }

                analysisHTML = `
                    <div class="signal-box ${signalClass}">
                        <strong>💡 買點診斷：${buySignal}</strong><br/>
                        ${buyReasons.length > 0 ? buyReasons.join('<br/>') : '指標尚未進到超賣或低估區，建議暫時等待機會。'}
                    </div>
                `;
            }

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>${info.ticker}</h3>
                    <button class="btn btn-danger" style="padding:2px 8px; font-size:0.75rem;" onclick="removeStock('${docId}')">刪除</button>
                </div>
                <div style="font-size:1.2rem; font-weight:bold; margin-bottom:10px;">現價: $${info.latest_price}</div>
                ${analysisHTML}
                <div id="chart-${docId}" class="chart-container"></div>
            `;
            return card;
        }

        // 刪除股票
        window.removeStock = async (docId) => {
            if (confirm("確定要刪除這支股票嗎？")) {
                await deleteDoc(doc(db, "user_stocks", docId));
            }
        };

        function renderChart(containerId, history) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const chart = LightweightCharts.createChart(container, {
                layout: { background: { color: 'transparent' }, textColor: '#9ca3af' },
                grid: { vertLines: { color: '#2e374a' }, horzLines: { color: '#2e374a' } },
                timeScale: { borderColor: '#2e374a' }
            });
            const lineSeries = chart.addLineSeries({ color: '#3b82f6', lineWidth: 2 });
            lineSeries.setData(history.map(h => ({ time: h.date, value: h.close })));
            chart.timeScale().fitContent();
        }
    </script>
</body>
</html>
